name: Package Scaling Lambda

permissions:
  contents: read

on:
  push:
    branches:
      - main
    paths:
      - 'infrastructure/environments/cloudformation/full/common/lambda/ecs_scale/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./infrastructure/environments/cloudformation/full/common/lambda/ecs_scale

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Poetry
        uses: snok/install-poetry@v1

      - name: Install Poetry Export Plugin
        run: poetry self add poetry-plugin-export

      - name: Build Lambda package
        run: |
          rm -rf build
          mkdir build

          poetry export \
            -f requirements.txt \
            --output requirements.txt \
            --without-hashes

          python -m pip install \
            -r requirements.txt \
            --target build

          cp ecs_scale/handler.py build/handler.py

      - name: Create deployment zip
        run: |
          cd build
          zip -r ../ecs-scaling-lambda.zip .

      - name: Upload artifact for deploy jobs
        uses: actions/upload-artifact@v4
        with:
          name: lambda-zip
          path: ./infrastructure/environments/cloudformation/full/common/lambda/ecs_scale/ecs-scaling-lambda.zip
          retention-days: 1
