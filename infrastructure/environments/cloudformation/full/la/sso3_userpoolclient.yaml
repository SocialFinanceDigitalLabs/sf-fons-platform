AWSTemplateFormatVersion: 2010-09-09
Description:  Connects Identity Pool to Azure

Parameters:
  EnvironmentName:
    Description: An environment name that is prefixed to resource names
    Type: String
  ApplicationName:
    Description: The name of the application (No Spaces)
    Default: "fons"
    Type: String
  OrganisationName:
    Description: The name of the organisation or la (No Spaces)
    Type: String
  CallbackUrl:
    Description: The URL of the web application that will receive the auth code (https)
    Type: String
  IdentityProviders:
    Description: A comma delimited list of the identity providers
    Type: CommaDelimitedList

Resources:
  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      UserPoolId: !Ref UserPoolId
      ClientName: !Sub "${ApplicationName}-${OrganisationName}-cognito-client-${EnvironmentName}"
      CallbackURLs:
        - !Ref CallbackUrl
      AllowedOAuthFlows:
        - "code"
        - "implicit"
      AllowedOAuthScopes:
        - "openid"
        - "email"
        - "aws.cognito.signin.user.admin"
        - "profile"
      SupportedIdentityProviders: !Ref IdentityProviders
      AllowedOAuthFlowsUserPoolClient: true
      PreventUserExistenceErrors: ENABLED

Outputs:
  CognitoClientId:
    Description: The Cognito Client ID
    Value: !Ref UserPoolClient